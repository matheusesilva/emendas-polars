name: Pipeline de Dados - Full Layer Update

on:
  schedule:
    - cron: '0 6 * * *' # Diariamente às 06:00 UTC
    
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install polars duckdb requests PyYAML

    - name: Run Data Pipeline
      run: python main.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Adiciona o ZIP da Raw e todos os Parquets das camadas Bronze, Silver e Gold
        git add -A data/

        # Adiciona logs
        git add logs/log.jsonl
        
        # Verifica se houve mudanças para evitar erro no workflow
        if git diff --cached --quiet; then
          echo "Nenhuma mudança detectada nos dados."
        else
          git commit -m "update: Data Layers: $(date +'%d/%m/%Y %H:%M')"
          git push
        fi
