<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Emendas Gold</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0e1117;
            --sidebar-color: #262730;
            --card-color: #161b22;
            --text-color: #fafafa;
            --accent-color: #ff4b4b; /* Cor de destaque do Streamlit */
        }
        body { font-family: 'Source Sans Pro', sans-serif; margin: 0; display: flex; background: var(--bg-color); color: var(--text-color); height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        #sidebar { width: 250px; background: var(--sidebar-color); padding: 20px; display: flex; flex-direction: column; gap: 20px; box-shadow: 2px 0 5px rgba(0,0,0,0.3); }
        select { background: #31333f; color: white; border: 1px solid #464855; padding: 8px; border-radius: 4px; width: 100%; cursor: pointer; }

        /* Main Content */
        #main { flex: 1; padding: 40px; overflow-y: auto; }
        .header { margin-bottom: 30px; }
        .header h1 { margin: 0; font-size: 2.2em; display: flex; align-items: center; gap: 15px; }
        
        /* KPIs */
        .kpi-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .kpi { padding: 10px; }
        .kpi span { font-size: 0.9em; color: #a3a8b4; }
        .kpi p { font-size: 1.8em; font-weight: bold; margin: 5px 0; }

        /* Gráficos */
        .grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 30px; }
        .card { background: var(--card-color); border-radius: 10px; padding: 20px; border: 1px solid #30363d; }
        .card h2 { font-size: 1.2em; margin-top: 0; margin-bottom: 20px; color: var(--text-color); }
        
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; display: none; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Filtros</h2>
        <label>Selecione o Ano</label>
        <select id="select-ano">
            <option value="2025" selected>2025</option>
            <option value="2024">2024</option>
            <option value="2023">2023</option>
            <option value="2022">2022</option>
            <option value="2021">2021</option>
            <option value="2020">2020</option>
            <option value="2019">2019</option>
            <option value="2018">2018</option>
            <option value="2017">2017</option>
            <option value="2016">2016</option>
            <option value="2015">2015</option>
            <option value="2014">2014</option>
        </select>
    </div>

    <div id="main">
        <div class="header">
            <h1>🏛️ Dashboard de Execução de Emendas</h1>
            <p style="color: #a3a8b4;">Análise da camada <b>Gold</b> processada via DuckDB-Wasm</p>
        </div>

        <div class="kpi-container">
            <div class="kpi"><span>Total Empenhado</span><p id="kpi-empenhado">R$ 0,00</p></div>
            <div class="kpi"><span>Total Pago</span><p id="kpi-pago">R$ 0,00</p></div>
            <div class="kpi"><span>Execução %</span><p id="kpi-perc">0.0%</p></div>
        </div>

        <div class="grid">
            <div class="card">
                <h2>Top 10 Autores por Valor Pago</h2>
                <div style="height: 400px;"><canvas id="chartAutores"></canvas></div>
            </div>
            <div class="card">
                <h2>Distribuição por UF</h2>
                <div style="height: 400px;"><canvas id="chartUF"></canvas></div>
            </div>
        </div>
    </div>

    <script type="module">
        import * as duckdb from 'https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm@1.28.0/+esm';

        let conn, chartAutores, chartUF;

        async function init() {
            const JSDELIVR_BUNDLES = duckdb.getJsDelivrBundles();
            const bundle = await duckdb.selectBundle(JSDELIVR_BUNDLES);
            const worker = new Worker(URL.createObjectURL(new Blob([`importScripts("${bundle.mainWorker}");`], {type: 'text/javascript'})));
            const db = new duckdb.AsyncDuckDB(new duckdb.ConsoleLogger(), worker);
            await db.instantiate(bundle.mainModule, bundle.pthreadWorker);
            conn = await db.connect();

            const root = window.location.origin + window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
            await db.registerFileURL('fato.parquet', new URL('data/03_gold/fato_execucao_orcamentaria.parquet', root).href, duckdb.DuckDBDataProtocol.HTTP, false);
            await db.registerFileURL('autor.parquet', new URL('data/03_gold/dim_autor.parquet', root).href, duckdb.DuckDBDataProtocol.HTTP, false);
            await db.registerFileURL('local.parquet', new URL('data/03_gold/dim_localidade.parquet', root).href, duckdb.DuckDBDataProtocol.HTTP, false);

            updateDashboard();
        }

        async function updateDashboard() {
            const ano = document.getElementById('select-ano').value;

            // Query KPIs
            const resKPI = await conn.query(`
                SELECT 
                    SUM(valor_empenhado) as empenhado, 
                    SUM(valor_pago) as pago,
                    (SUM(valor_pago) / SUM(valor_empenhado)) * 100 as perc
                FROM 'fato.parquet' WHERE ano_referencia = ${ano}
            `);
            const kpis = resKPI.toArray()[0].toJSON();
            document.getElementById('kpi-empenhado').innerText = kpis.empenhado.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
            document.getElementById('kpi-pago').innerText = kpis.pago.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
            document.getElementById('kpi-perc').innerText = Number(kpis.perc).toFixed(1) + '%';

            // Query Autores
            const resAutores = await conn.query(`
                SELECT a.nome_autor, SUM(f.valor_pago) as total FROM 'fato.parquet' f
                JOIN 'autor.parquet' a ON f.autor_id = a.autor_id
                WHERE f.ano_referencia = ${ano} GROUP BY 1 ORDER BY 2 DESC LIMIT 10
            `);
            const dataAutores = resAutores.toArray().map(r => r.toJSON());

            // Query UF
            const resUF = await conn.query(`
                SELECT l.sigla_uf, SUM(f.valor_pago) as total FROM 'fato.parquet' f
                JOIN 'local.parquet' l ON f.municipio_id = l.municipio_id
                WHERE f.ano_referencia = ${ano} GROUP BY 1 ORDER BY 2 DESC
            `);
            const dataUF = resUF.toArray().map(r => r.toJSON());

            renderCharts(dataAutores, dataUF);
        }

        function renderCharts(autores, ufs) {
            if (chartAutores) chartAutores.destroy();
            if (chartUF) chartUF.destroy();

            chartAutores = new Chart(document.getElementById('chartAutores'), {
                type: 'bar',
                data: {
                    labels: autores.map(d => d.nome_autor),
                    datasets: [{
                        label: 'total',
                        data: autores.map(d => d.total),
                        backgroundColor: '#2e75b6',
                        barThickness: 20, // <-- LARGURA FIXA AQUI
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { 
                        x: { grid: { display: false }, ticks: { color: '#a3a8b4' } },
                        y: { ticks: { color: '#fafafa', font: { size: 11 } } }
                    },
                    plugins: { legend: { display: false } }
                }
            });

            // Gráfico de Pizza
            chartUF = new Chart(document.getElementById('chartUF'), {
                type: 'doughnut',
                data: {
                    labels: ufs.map(d => d.sigla_uf),
                    datasets: [{
                        data: ufs.map(d => d.total),
                        borderWidth: 0,
                        backgroundColor: ['#1c83e1', '#ff4b4b', '#00d4a1', '#ffbd45', '#7d33ff', '#ff33f6']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'right', labels: { color: '#fafafa' } } }
                }
            });
        }

        document.getElementById('select-ano').addEventListener('change', updateDashboard);
        init();
    </script>
</body>
</html>
